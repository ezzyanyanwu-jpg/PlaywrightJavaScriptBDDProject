name: Playwright UI BDD Tests

on:
  push:
    branches:
      - main
      - master
    paths:
    - 'pages/**'
    - 'assertions/**'
    - 'world/**'
    - 'hooks/**'
    - 'utilities/**'
    - 'config/**'
    - 'constants/**'
    - 'tests/Features/**'
    - 'tests/TestSteps/**'
    - 'playwright.config.js'
    - 'package.json'
    - 'package-lock.json'
    - '.github/workflows/ui-tests.yml'

  pull_request:
    branches:
      - main
      - master
    paths:
    - 'pages/**'
    - 'assertions/**'
    - 'world/**'
    - 'hooks/**'
    - 'utilities/**'
    - 'config/**'
    - 'constants/**'
    - 'tests/Features/**'
    - 'tests/TestSteps/**'
    - 'playwright.config.js'
    - 'package.json'
    - 'package-lock.json'
    - '.github/workflows/ui-tests.yml'

jobs:

  ui-tests:

    name: UI BDD Tests

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline --save-dev

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Execute UI BDD Tests
        run: npm run test:ui:ci
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:

    name: Deploy to Production

    needs: ui-tests

    runs-on: ubuntu-latest

    if: success()

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy
        run: |
          echo "Deploying to production..."