name: API Playwright Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]  # master is excluded - pushes to master → will not run this API workflow. It will run only on main pushes. Add master to run on master pushes 
    paths:
      - 'tests/RestAssuredAPITest/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [ main ]  # master is excluded - pull requests to master → will not run this API workflow. It will run only on main pull requests. Add master to run on master pull requests
    paths:
      - 'tests/RestAssuredAPITest/**'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  api-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run API tests only
        run: npx playwright test --project=api

  deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    needs: api-tests

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."